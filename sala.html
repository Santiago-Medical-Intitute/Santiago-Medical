<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel de Sala · Santiago Medical Institute</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --crimson:#CD1D52; --bright:#E33C3B; --deep:#B22030;
  --ink:#1C1719; --muted:#857479; --faint:#A99CA0;
  --bg:#FAF7F6; --card:#FFFFFF; --line:#ECE0E2; --tint:#F7F0F1;
  --grad:linear-gradient(120deg,var(--deep),var(--crimson) 55%,var(--bright));
  --pos:#1E7A4D; --neg:#C0202F; --warn:#B7791F; --info:#3B6FB3;
  --serif:'Cormorant Garamond',Georgia,serif; --sans:'Inter',system-ui,sans-serif;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
.wrap{max-width:960px;margin:0 auto;padding:20px 16px 64px}

/* HEADER */
.hdr{display:flex;align-items:center;justify-content:space-between;padding-bottom:14px;margin-bottom:18px;border-bottom:1px solid var(--line)}
.hdr-left{display:flex;align-items:center;gap:14px}
.hdr h1{font-family:var(--serif);font-weight:600;font-size:26px;margin:0;letter-spacing:.01em}
.hdr .pab-badge{display:inline-flex;align-items:center;justify-content:center;width:38px;height:38px;border-radius:10px;font-family:var(--serif);font-weight:700;font-size:22px;color:#fff}
.pab-1{background:#3B6FB3} .pab-2{background:#9B3A8E} .pab-3{background:var(--pos)}
.hdr .fecha{font-size:13px;color:var(--muted)}
.hdr-right{display:flex;align-items:center;gap:10px}
.who-txt{font-size:12px;color:var(--muted)}
.reload-btn{border:1px solid var(--line);background:var(--card);border-radius:9px;padding:7px 12px;font-size:12.5px;font-weight:600;cursor:pointer;color:var(--ink)}
.reload-btn:hover{border-color:var(--crimson);color:var(--crimson)}

/* GATE */
#gate{max-width:380px;margin:12vh auto 0;background:var(--card);border:1px solid var(--line);border-radius:18px;padding:30px 26px;text-align:center;box-shadow:0 12px 40px -22px rgba(28,23,25,.4)}
#gate h2{font-family:var(--serif);font-weight:600;font-size:24px;margin:0 0 4px}
#gate p{color:var(--muted);font-size:13px;margin:0 0 18px}
#gate input{width:100%;padding:13px 14px;border:1px solid var(--line);border-radius:11px;font-family:var(--sans);font-size:15px;text-align:center;letter-spacing:.04em}
#gate input:focus{outline:none;border-color:var(--crimson)}
#gate button{width:100%;margin-top:12px;border:0;border-radius:11px;padding:13px;font-family:var(--sans);font-size:15px;font-weight:600;color:#fff;background:var(--grad);cursor:pointer}
#gateMsg{color:var(--neg);font-size:13px;margin-top:10px;min-height:18px}

#app{display:none}

/* STATUS BAR */
.status-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.st-chip{padding:8px 14px;border-radius:10px;font-size:12.5px;font-weight:600;border:1px solid var(--line);background:var(--card);color:var(--muted)}
.st-chip .st-n{font-family:var(--serif);font-weight:700;font-size:18px;margin-right:4px}
.st-chip.active{background:var(--ink);color:#fff;border-color:var(--ink)}
.st-chip.en-cirugia{background:var(--crimson);color:#fff;border-color:var(--crimson);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.85}}

/* CASO CARD */
.caso{background:var(--card);border:1px solid var(--line);border-radius:16px;margin-bottom:14px;overflow:hidden}
.caso.en-cirugia{border-color:var(--crimson);border-width:2px;box-shadow:0 0 0 3px rgba(205,29,82,.12)}
.caso.finalizada{opacity:.7}
.caso-head{padding:14px 16px;display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.caso-pac{font-family:var(--serif);font-weight:700;font-size:22px;line-height:1.2}
.caso-meta{font-size:12.5px;color:var(--muted);margin-top:2px}
.caso-right{text-align:right}
.caso-folio{font-size:12px;color:var(--muted);font-weight:600;letter-spacing:.03em}
.caso-total{font-family:var(--serif);font-weight:700;font-size:20px;font-variant-numeric:tabular-nums}
.caso-badge{display:inline-block;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-top:4px}
.b-programada{background:#EEF2F8;color:var(--info)}
.b-preparando{background:#FBF3E2;color:var(--warn)}
.b-en_cirugia{background:#FBEBED;color:var(--neg)}
.b-en_recuperacion{background:#E4F1F1;color:#0E7C86}
.b-finalizada{background:#E7F4ED;color:var(--pos)}

.caso-body{padding:0 16px 16px}

/* SECCIONES DEL CASO */
.sec{margin-top:14px;padding:14px;background:var(--tint);border:1px solid var(--line);border-radius:12px}
.sec-title{font-size:12px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.sec-title .ico{font-size:16px}

/* VERIFICACIÓN */
.verif-info{display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:13px;margin-bottom:10px}
.verif-info .lbl{color:var(--muted);font-size:11.5px;text-transform:uppercase;letter-spacing:.05em}
.verif-info .val{font-weight:600}
.verif-btn{border:0;border-radius:10px;padding:10px 18px;font-family:var(--sans);font-size:14px;font-weight:600;cursor:pointer;width:100%}
.verif-btn.pending{background:var(--grad);color:#fff}
.verif-btn.done{background:var(--pos);color:#fff;cursor:default}

/* DETALLE DEL PRESUPUESTO */
.det-line{display:flex;justify-content:space-between;font-size:13px;padding:4px 0;border-bottom:1px solid rgba(0,0,0,.06)}
.det-line:last-child{border-bottom:none}
.det-line .det-k{color:var(--muted)}
.det-line .det-v{font-weight:600;font-variant-numeric:tabular-nums}
.det-line.det-total{font-weight:700;font-size:14px;color:var(--ink);border-top:2px solid var(--ink);border-bottom:none;margin-top:4px;padding-top:8px}

/* EQUIPO */
.equipo-list{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.equipo-tag{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;background:var(--card);border:1px solid var(--line);border-radius:8px;font-size:12.5px}
.equipo-tag .eq-rol{font-weight:600;color:var(--crimson);text-transform:uppercase;font-size:10px;letter-spacing:.05em}
.equipo-tag .eq-x{cursor:pointer;color:var(--muted);font-weight:700;margin-left:4px}
.equipo-tag .eq-x:hover{color:var(--neg)}
.equipo-add{display:flex;gap:6px}
.equipo-add input{flex:1;padding:8px 10px;border:1px solid var(--line);border-radius:8px;font-family:var(--sans);font-size:13px}
.equipo-add input:focus{outline:none;border-color:var(--crimson)}
.equipo-add select{padding:8px 10px;border:1px solid var(--line);border-radius:8px;font-family:var(--sans);font-size:13px;background:var(--card)}
.equipo-add button{padding:8px 14px;border:0;border-radius:8px;background:var(--ink);color:#fff;font-family:var(--sans);font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}

/* RELOJ */
.clock-wrap{text-align:center;padding:8px 0}
.clock-display{font-family:var(--serif);font-weight:700;font-size:52px;line-height:1;margin:8px 0;font-variant-numeric:tabular-nums;letter-spacing:.02em}
.clock-display.running{color:var(--crimson)}
.clock-display.stopped{color:var(--pos)}
.clock-sub{font-size:13px;color:var(--muted);margin-bottom:10px}
.clock-cotizada{font-size:12px;color:var(--muted)}
.clock-cotizada strong{color:var(--ink)}

/* EXCESO */
.excess-bar{margin-top:10px;padding:10px 14px;background:#FFF7F8;border:1.5px solid var(--crimson);border-radius:10px;display:none;text-align:center}
.excess-bar.show{display:block}
.excess-bar .ex-label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-weight:600}
.excess-bar .ex-time{font-family:var(--serif);font-weight:700;font-size:28px;color:var(--neg)}
.excess-bar .ex-cost{font-size:15px;font-weight:700;color:var(--neg);margin-top:2px}

.clock-btns{display:flex;gap:8px;justify-content:center;margin-top:12px}
.clock-btn{border:0;border-radius:10px;padding:12px 28px;font-family:var(--sans);font-size:15px;font-weight:700;cursor:pointer}
.clock-btn.start{background:var(--pos);color:#fff}
.clock-btn.stop{background:var(--neg);color:#fff}
.clock-btn.disabled{background:#ddd;color:#aaa;cursor:not-allowed}

/* EXTRAS */
.extra-search{position:relative;margin-bottom:10px}
.extra-search input{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:10px;font-family:var(--sans);font-size:14px}
.extra-search input:focus{outline:none;border-color:var(--crimson)}
.extra-results{position:absolute;top:100%;left:0;right:0;z-index:50;background:var(--card);border:1px solid var(--line);border-radius:10px;box-shadow:0 8px 24px -8px rgba(0,0,0,.15);max-height:240px;overflow-y:auto;display:none}
.extra-results.show{display:block}
.extra-opt{padding:10px 12px;cursor:pointer;font-size:13px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--tint)}
.extra-opt:hover{background:var(--tint)}
.extra-opt:last-child{border-bottom:none}
.extra-opt .eo-name{font-weight:500}
.extra-opt .eo-cat{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.extra-opt .eo-price{font-weight:600;font-variant-numeric:tabular-nums;color:var(--ink)}
.extras-list{margin-top:8px}
.ext-row{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:var(--card);border:1px solid var(--line);border-radius:9px;margin-bottom:5px;font-size:13px}
.ext-row .ext-desc{flex:1}
.ext-row .ext-qty{width:50px;text-align:center;padding:4px;border:1px solid var(--line);border-radius:6px;font-family:var(--sans);font-size:13px;margin:0 8px}
.ext-row .ext-price{font-weight:600;font-variant-numeric:tabular-nums;min-width:80px;text-align:right}
.ext-row .ext-del{cursor:pointer;color:var(--muted);font-weight:700;margin-left:8px;font-size:16px}
.ext-row .ext-del:hover{color:var(--neg)}
.ext-row.validated{background:#E7F4ED;border-color:var(--pos)}
.ext-row.rejected{background:#FBEBED;border-color:var(--neg);opacity:.6;text-decoration:line-through}
.ext-total{display:flex;justify-content:space-between;font-weight:700;font-size:14px;padding:8px 10px;margin-top:6px;border-top:2px solid var(--ink)}

/* CIERRE */
.cierre-btn{width:100%;border:0;border-radius:10px;padding:12px;font-family:var(--sans);font-size:15px;font-weight:700;cursor:pointer;background:var(--pos);color:#fff;margin-top:14px}
.cierre-btn:disabled{background:#ddd;color:#aaa;cursor:not-allowed}

/* EMPTY */
.empty{text-align:center;color:var(--muted);padding:60px 20px;font-size:15px}
.empty .e-ico{font-size:48px;margin-bottom:12px;opacity:.5}

.foot{margin-top:22px;text-align:center;color:var(--faint);font-size:12px}
</style>
</head>
<body>

<!-- GATE -->
<div id="gate">
  <h2>Panel de Sala</h2>
  <p>Ingrese su clave para acceder al panel del pabellón</p>
  <input type="password" id="clave" placeholder="Clave de acceso" autocomplete="off">
  <button id="entrar">Ingresar</button>
  <div id="gateMsg"></div>
</div>

<!-- APP -->
<div id="app" class="wrap">
  <div class="hdr">
    <div class="hdr-left">
      <div class="pab-badge" id="pabBadge"></div>
      <div>
        <h1 id="pabTitle">Panel Pabellón</h1>
        <div class="fecha" id="fechaHoy"></div>
      </div>
    </div>
    <div class="hdr-right">
      <span class="who-txt" id="whoTxt"></span>
      <span class="who-txt" id="lastUpdate"></span>
      <button class="reload-btn" onclick="cargar()">↻ Actualizar</button>
    </div>
  </div>

  <div class="status-bar" id="statusBar"></div>
  <div id="casosList"></div>
  <div class="foot">Santiago Medical Institute · Panel de Pabellón en vivo</div>
</div>

<script>
/* ═══ CONFIG ═══ */
const SUPA_URL='https://rhpguniznuhljiigwetq.supabase.co';
const SUPA_KEY='sb_publishable_lVaI9a2wWFa0PSL3edPiRA_cVMlXDwG';
const $=id=>document.getElementById(id);
const clp=n=>'$'+Math.round(n||0).toLocaleString('es-CL');
const PAB=+(new URLSearchParams(location.search).get('pab'))||1;
const PAB_NAMES={1:'Pabellón 1 — Principal',2:'Pabellón 2 — Fertilidad',3:'Pabellón 3 — Versátil'};
const ESTADO_LABELS={programada:'Programada',preparando:'Preparando',en_cirugia:'En Cirugía',en_recuperacion:'En Recuperación',finalizada:'Finalizada'};
const ROLES=['cirujano','anestesista','arsenalera','enfermero','instrumentista','otro'];
const ROLES_LABEL={cirujano:'Cirujano',anestesista:'Anestesista',arsenalera:'Arsenalera',enfermero:'Enfermero/a',instrumentista:'Instrumentista',otro:'Otro'};

let CLAVE='', SESION='', CASOS=[];
let TIMERS={};       // { casoId: intervalId }
let SEARCH_CACHE={}; // cache de búsquedas de insumos

/* ═══ RPC ═══ */
async function rpc(fn,body){
  const r=await fetch(SUPA_URL+'/rest/v1/rpc/'+fn,{method:'POST',
    headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json'},
    body:JSON.stringify(body)});
  if(!r.ok){ const t=await r.text(); throw new Error(t); }
  return r.json();
}

/* ═══ LOGIN ═══ */
$('entrar').onclick=entrar;
$('clave').addEventListener('keydown',e=>{ if(e.key==='Enter') entrar(); });
async function entrar(){
  const c=$('clave').value.trim(); if(!c) return;
  $('gateMsg').textContent='Verificando…';
  try{
    const u=await rpc('smi_login',{p_clave:c});
    const usr=Array.isArray(u)?u[0]:u;
    if(!usr){ $('gateMsg').textContent='Clave incorrecta.'; return; }
    SESION=usr.nombre; CLAVE=c;
    initUI();
    await cargar();
    $('gate').style.display='none'; $('app').style.display='block';
  }catch(e){ $('gateMsg').textContent='Error de conexión.'; }
}

/* ═══ INIT UI ═══ */
function initUI(){
  const badge=$('pabBadge');
  badge.textContent=PAB;
  badge.className='pab-badge pab-'+PAB;
  $('pabTitle').textContent='Panel Pabellón '+PAB;
  document.title='Pabellón '+PAB+' · SMI';
  const hoy=new Date();
  const dias=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const meses=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  $('fechaHoy').textContent=dias[hoy.getDay()]+' '+hoy.getDate()+' de '+meses[hoy.getMonth()]+', '+hoy.getFullYear();
  $('whoTxt').textContent=SESION;
}

/* ═══ CARGAR CASOS ═══ */
async function cargar(){
  try{
    const hoy=new Date().toISOString().slice(0,10);
    const data=await rpc('smi_casos_pabellon',{p_clave:CLAVE,p_pabellon:PAB,p_fecha:hoy});
    CASOS=Array.isArray(data)?data:[];
    renderAll();
    const ahora=new Date();
    $('lastUpdate').textContent='Actualizado '+ahora.toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'});
  }catch(e){ console.error(e); }
}

/* ═══ RENDER ═══ */
function renderAll(){ renderStatus(); renderCasos(); }

function renderStatus(){
  const counts={};
  Object.keys(ESTADO_LABELS).forEach(e=>counts[e]=0);
  CASOS.forEach(c=>{ if(counts[c.estado]!==undefined) counts[c.estado]++; });
  const enCx=counts['en_cirugia']>0;
  let h='';
  Object.entries(ESTADO_LABELS).forEach(([k,v])=>{
    const cls=k==='en_cirugia'&&enCx?'st-chip en-cirugia':(counts[k]>0?'st-chip active':'st-chip');
    h+='<div class="'+cls+'"><span class="st-n">'+counts[k]+'</span>'+v+'</div>';
  });
  $('statusBar').innerHTML=h;
}

function renderCasos(){
  if(!CASOS.length){
    $('casosList').innerHTML='<div class="empty"><div class="e-ico">🏥</div>No hay cirugías programadas para hoy en este pabellón.<br>Asigne casos desde el Planificador.</div>';
    return;
  }
  $('casosList').innerHTML=CASOS.map(casoHTML).join('');
  // Arrancar timers para cirugías en curso
  CASOS.forEach(c=>{
    if(c.estado==='en_cirugia' && c.hora_inicio_real) startTimer(c.id, c.hora_inicio_real, c.duracion_cotizada_min);
  });
}

function casoHTML(c){
  const cot=c.cotizacion||{};
  const det=cot.detalle||{};
  const isActive=c.estado==='en_cirugia';
  const isDone=c.estado==='finalizada';

  let h='<div class="caso '+c.estado+'" id="caso-'+c.id+'">';

  // ─── HEADER ───
  h+='<div class="caso-head"><div>';
  h+='<div class="caso-pac">'+(cot.paciente||'Sin nombre')+'</div>';
  h+='<div class="caso-meta">'+(cot.cirugia||'—')+' · '+(cot.cirujano||'—')+(cot.rut?' · '+cot.rut:'')+'</div>';
  h+='</div><div class="caso-right">';
  h+='<div class="caso-folio">'+(cot.folio||'')+'</div>';
  h+='<div class="caso-badge b-'+c.estado+'">'+ESTADO_LABELS[c.estado]+'</div>';
  h+='</div></div>';

  h+='<div class="caso-body">';

  // ─── 1. VERIFICACIÓN DE IDENTIDAD ───
  h+='<div class="sec">';
  h+='<div class="sec-title"><span class="ico">🪪</span> Verificación de Identidad</div>';
  h+='<div class="verif-info">';
  h+='<div><div class="lbl">Paciente</div><div class="val">'+(cot.paciente||'—')+'</div></div>';
  h+='<div><div class="lbl">RUT</div><div class="val">'+(cot.rut||'—')+'</div></div>';
  h+='<div><div class="lbl">Cirugía</div><div class="val">'+(cot.cirugia||'—')+'</div></div>';
  h+='<div><div class="lbl">Cirujano</div><div class="val">'+(cot.cirujano||'—')+'</div></div>';
  h+='</div>';
  if(c.paciente_verificado){
    h+='<button class="verif-btn done">✓ Identidad verificada por '+(c.verificado_por||'')+'</button>';
  } else if(!isDone){
    h+='<button class="verif-btn pending" onclick="verificar(\''+c.id+'\')">Verificar identidad del paciente</button>';
  }
  h+='</div>';

  // ─── 2. INFORMACIÓN QUIRÚRGICA ───
  h+='<div class="sec">';
  h+='<div class="sec-title"><span class="ico">📋</span> Información Quirúrgica</div>';
  h+='<div class="det-line"><span class="det-k">Cirugía</span><span class="det-v">'+(cot.cirugia||'—')+'</span></div>';
  h+='<div class="det-line"><span class="det-k">Tiempo de pabellón</span><span class="det-v">'+(cot.horas||0)+' horas</span></div>';
  if(cot.hospitalizacion) h+='<div class="det-line"><span class="det-k">Hospitalización</span><span class="det-v">Sí</span></div>';
  if((det.extras||[]).length>0){
    h+='<div class="det-line"><span class="det-k">Extras programados</span><span class="det-v">'+(det.extras||[]).map(x=>x.n+' (×'+x.c+')').join(', ')+'</span></div>';
  }
  h+='</div>';

  // ─── 3. EQUIPO QUIRÚRGICO ───
  h+='<div class="sec">';
  h+='<div class="sec-title"><span class="ico">👥</span> Equipo Quirúrgico</div>';
  h+='<div class="equipo-list" id="equipo-'+c.id+'">';
  (c.equipo||[]).forEach(e=>{
    h+='<div class="equipo-tag"><span class="eq-rol">'+ROLES_LABEL[e.rol]+'</span> '+e.nombre;
    if(!isDone) h+='<span class="eq-x" onclick="quitarEquipo(\''+c.id+'\',\''+e.id+'\')" title="Quitar">×</span>';
    h+='</div>';
  });
  h+='</div>';
  if(!isDone){
    h+='<div class="equipo-add">';
    h+='<input type="text" id="eqNom-'+c.id+'" placeholder="Nombre">';
    h+='<select id="eqRol-'+c.id+'">'+ROLES.map(r=>'<option value="'+r+'">'+ROLES_LABEL[r]+'</option>').join('')+'</select>';
    h+='<button onclick="agregarEquipo(\''+c.id+'\')">+ Agregar</button>';
    h+='</div>';
  }
  h+='</div>';

  // ─── 4. RELOJ QUIRÚRGICO ───
  h+='<div class="sec">';
  h+='<div class="sec-title"><span class="ico">⏱</span> Reloj Quirúrgico</div>';
  h+='<div class="clock-wrap">';
  h+='<div class="clock-cotizada">Tiempo cotizado: <strong>'+(cot.horas||0)+' h ('+c.duracion_cotizada_min+' min)</strong></div>';

  if(c.hora_fin_real){
    // Cirugía terminada — mostrar resultado
    const cls=c.delta_min>0?'stopped':'stopped';
    h+='<div class="clock-display stopped">'+fmtMin(c.duracion_real_min)+'</div>';
    h+='<div class="clock-sub">';
    if(c.delta_min>0) h+='Excedió en '+c.delta_min+' min';
    else if(c.delta_min===0) h+='Tiempo exacto al cotizado';
    else h+='Terminó '+(Math.abs(c.delta_min))+' min antes del cotizado';
    h+='</div>';
  } else if(c.hora_inicio_real){
    // En cirugía — reloj corriendo
    h+='<div class="clock-display running" id="clock-'+c.id+'">00:00:00</div>';
    h+='<div class="clock-sub" id="clockSub-'+c.id+'"></div>';
    h+='<div class="excess-bar" id="excess-'+c.id+'"><div class="ex-label">Tiempo excedido</div><div class="ex-time" id="exTime-'+c.id+'">0 min</div></div>';
    h+='<div class="clock-btns"><button class="clock-btn stop" onclick="finalizarCirugia(\''+c.id+'\')">⏹ Detener reloj</button></div>';
  } else {
    // No iniciada
    h+='<div class="clock-display" style="color:var(--muted)">00:00:00</div>';
    h+='<div class="clock-sub">El reloj se inicia cuando comience la cirugía</div>';
    const canStart=c.paciente_verificado;
    if(canStart){
      h+='<div class="clock-btns"><button class="clock-btn start" onclick="iniciarCirugia(\''+c.id+'\')">▶ Iniciar cirugía</button></div>';
    } else {
      h+='<div class="clock-btns"><button class="clock-btn disabled" disabled>Verificar identidad primero</button></div>';
    }
  }
  h+='</div></div>';

  // ─── 5. EXTRAS EN PABELLÓN ───
  h+='<div class="sec">';
  h+='<div class="sec-title"><span class="ico">💉</span> Extras en Pabellón</div>';

  if(!isDone){
    h+='<div class="extra-search" id="esWrap-'+c.id+'">';
    h+='<input type="text" id="esInput-'+c.id+'" placeholder="Buscar insumo (escriba las primeras letras)…" oninput="buscarInsumo(\''+c.id+'\',this.value)" onfocus="buscarInsumo(\''+c.id+'\',this.value)" autocomplete="off">';
    h+='<div class="extra-results" id="esResults-'+c.id+'"></div>';
    h+='</div>';
  }

  h+='<div class="extras-list" id="extras-'+c.id+'">';
  let totalExtras=0;
  (c.extras||[]).forEach(x=>{
    const cls=x.estado==='validado'?'ext-row validated':(x.estado==='rechazado'?'ext-row rejected':'ext-row');
    h+='<div class="'+cls+'">';
    h+='<span class="ext-desc">'+x.descripcion+'</span>';
    if(x.estado==='pendiente' && !isDone) h+='<span class="ext-del" onclick="quitarExtra(\''+c.id+'\',\''+x.id+'\')" title="Quitar">×</span>';
    h+='</div>';
    if(x.estado!=='rechazado') totalExtras+=x.precio_total;
  });
  h+='</div>';
  if((c.extras||[]).length>0){
    h+='<div class="ext-total"><span>Total extras registrados</span><span>'+c.extras.filter(x=>x.estado!=='rechazado').length+' ítem(s)</span></div>';
  }
  h+='</div>';

  // ─── BOTÓN DE CIERRE ───
  if(c.estado==='en_recuperacion'){
    h+='<button class="cierre-btn" onclick="cerrarCaso(\''+c.id+'\')">✓ Finalizar caso</button>';
  }

  h+='</div></div>';
  return h;
}

/* ═══ HELPERS ═══ */
function fmtMin(m){ const h=Math.floor(m/60); const mm=m%60; return String(h).padStart(2,'0')+':'+String(mm).padStart(2,'0')+':00'; }
function fmtTimer(secs){
  const h=Math.floor(secs/3600); const m=Math.floor((secs%3600)/60); const s=secs%60;
  return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
}

/* ═══ TIMER ═══ */
function startTimer(casoId, inicioISO, cotizadaMin){
  if(TIMERS[casoId]) clearInterval(TIMERS[casoId]);
  const inicio=new Date(inicioISO).getTime();
  const cotizadaSec=cotizadaMin*60;

  function tick(){
    const now=Date.now();
    const elapsed=Math.floor((now-inicio)/1000);
    const el=$('clock-'+casoId);
    if(el) el.textContent=fmtTimer(elapsed);

    const sub=$('clockSub-'+casoId);
    const remaining=cotizadaSec-elapsed;
    if(sub){
      if(remaining>0) sub.textContent='Quedan '+Math.ceil(remaining/60)+' min del tiempo cotizado';
      else sub.textContent='';
    }

    // Exceso
    if(elapsed>cotizadaSec){
      const exMin=Math.ceil((elapsed-cotizadaSec)/60);
      const exBar=$('excess-'+casoId);
      if(exBar){ exBar.classList.add('show'); }
      const exTime=$('exTime-'+casoId);
      if(exTime) exTime.textContent=exMin+' min';
    }
  }

  tick();
  TIMERS[casoId]=setInterval(tick, 1000);
}

/* ═══ ACCIONES ═══ */
async function verificar(casoId){
  if(!confirm('¿Confirma que el paciente en camilla corresponde a esta cotización?')) return;
  try{
    await rpc('smi_verificar_paciente',{p_clave:CLAVE,p_caso_id:casoId});
    await cargar();
  }catch(e){ alert('Error: '+e.message); }
}

async function iniciarCirugia(casoId){
  if(!confirm('¿Iniciar el reloj quirúrgico? Esta acción no se puede deshacer.')) return;
  try{
    await rpc('smi_iniciar_cirugia',{p_clave:CLAVE,p_caso_id:casoId});
    await cargar();
  }catch(e){ alert('Error: '+e.message); }
}

async function finalizarCirugia(casoId){
  if(!confirm('¿Detener el reloj y finalizar la cirugía?')) return;
  try{
    if(TIMERS[casoId]){ clearInterval(TIMERS[casoId]); delete TIMERS[casoId]; }
    const res=await rpc('smi_finalizar_cirugia',{p_clave:CLAVE,p_caso_id:casoId});
    if(res.excedido_min>0){
      alert('Cirugía finalizada.\n\nDuración real: '+res.duracion_real_min+' min\nTiempo cotizado: '+res.duracion_cotizada_min+' min\nExcedido: '+res.excedido_min+' min');
    }
    await cargar();
  }catch(e){ alert('Error: '+e.message); }
}

async function cerrarCaso(casoId){
  if(!confirm('¿Finalizar este caso? El paciente pasará a estado "Finalizada".')) return;
  try{
    await rpc('smi_cerrar_caso',{p_clave:CLAVE,p_caso_id:casoId});
    await cargar();
  }catch(e){ alert('Error: '+e.message); }
}

/* ═══ EQUIPO ═══ */
async function agregarEquipo(casoId){
  const nom=$('eqNom-'+casoId).value.trim();
  const rol=$('eqRol-'+casoId).value;
  if(!nom){ alert('Ingrese el nombre'); return; }
  try{
    await rpc('smi_agregar_equipo',{p_clave:CLAVE,p_caso_id:casoId,p_nombre:nom,p_rol:rol});
    await cargar();
  }catch(e){ alert('Error: '+e.message); }
}

async function quitarEquipo(casoId, equipoId){
  if(!confirm('¿Quitar este miembro del equipo?')) return;
  try{
    await rpc('smi_quitar_equipo',{p_clave:CLAVE,p_equipo_id:equipoId});
    await cargar();
  }catch(e){ alert('Error: '+e.message); }
}

/* ═══ EXTRAS — BÚSQUEDA ═══ */
let searchTimeout=null;
async function buscarInsumo(casoId, query){
  const q=query.trim();
  const results=$('esResults-'+casoId);
  if(q.length<2){ results.classList.remove('show'); return; }

  clearTimeout(searchTimeout);
  searchTimeout=setTimeout(async()=>{
    try{
      const data=await rpc('smi_buscar_insumos',{p_clave:CLAVE,p_q:q});
      const items=Array.isArray(data)?data:(data?[data]:[]);
      if(!items.length){
        results.innerHTML='<div class="extra-opt"><span class="eo-name" style="color:var(--muted)">Sin resultados para "'+q+'"</span></div>';
      } else {
        results.innerHTML=items.map(i=>
          '<div class="extra-opt" onclick="seleccionarInsumo(\''+casoId+'\','+JSON.stringify(i).replace(/'/g,"\\'")+')">'+
          '<div><span class="eo-name">'+i.nombre+'</span><br><span class="eo-cat">'+i.categoria+'</span></div>'+
          '</div>'
        ).join('');
      }
      results.classList.add('show');
    }catch(e){ console.error(e); }
  }, 300);
}

async function seleccionarInsumo(casoId, insumo){
  try{
    await rpc('smi_agregar_extra',{
      p_clave:CLAVE,
      p_caso_id:casoId,
      p_tipo:'insumo',
      p_descripcion:insumo.nombre,
      p_cantidad:1,
      p_precio_unitario:insumo.precio_clp,
      p_catalogo_insumo_id:insumo.id
    });
    $('esInput-'+casoId).value='';
    $('esResults-'+casoId).classList.remove('show');
    await cargar();
  }catch(e){ alert('Error: '+e.message); }
}

async function quitarExtra(casoId, extraId){
  if(!confirm('¿Quitar este extra?')) return;
  try{
    await rpc('smi_quitar_extra',{p_clave:CLAVE,p_extra_id:extraId});
    await cargar();
  }catch(e){ alert('Error: '+e.message); }
}

// Cerrar dropdown al hacer clic fuera
document.addEventListener('click', e=>{
  if(!e.target.closest('.extra-search')){
    document.querySelectorAll('.extra-results').forEach(r=>r.classList.remove('show'));
  }
});

// Auto-refresh cada 60 segundos
setInterval(()=>{ if(CLAVE) cargar(); }, 60000);

// Recargar cuando el computador despierta del reposo
document.addEventListener('visibilitychange', ()=>{
  if(!document.hidden && CLAVE) cargar();
});

// Detectar wake del reposo: si el intervalo se atrasa mucho, recargar
let lastTick=Date.now();
setInterval(()=>{
  const now=Date.now();
  if(now-lastTick>120000 && CLAVE){ cargar(); }
  lastTick=now;
}, 30000);
</script>
