<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Operaciones · SMI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --crimson:#CD1D52; --bright:#E33C3B; --deep:#B22030;
  --ink:#1C1719; --muted:#857479; --faint:#A99CA0;
  --bg:#FAF7F6; --card:#FFFFFF; --line:#ECE0E2; --tint:#F7F0F1;
  --grad:linear-gradient(120deg,var(--deep),var(--crimson) 55%,var(--bright));
  --pos:#1E7A4D; --neg:#C0202F; --warn:#B7791F; --info:#3B6FB3;
  --pab1:#3B6FB3; --pab2:#9B3A8E; --pab3:#1E7A4D;
  --serif:'Cormorant Garamond',Georgia,serif; --sans:'Inter',system-ui,sans-serif;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
.wrap{max-width:1200px;margin:0 auto;padding:20px 16px 64px}

/* HEADER */
.hdr{display:flex;align-items:center;justify-content:space-between;padding-bottom:14px;margin-bottom:18px;border-bottom:1px solid var(--line);flex-wrap:wrap;gap:10px}
.hdr h1{font-family:var(--serif);font-weight:600;font-size:26px;margin:0}
.hdr .sub{font-size:13px;color:var(--muted)}
.hdr-right{display:flex;align-items:center;gap:10px}
.who-txt{font-size:12px;color:var(--muted)}
.hdr-btn{border:1px solid var(--line);background:var(--card);border-radius:9px;padding:7px 12px;font-size:12.5px;font-weight:600;cursor:pointer;color:var(--ink);font-family:var(--sans)}
.hdr-btn:hover{border-color:var(--crimson);color:var(--crimson)}

/* GATE */
#gate{max-width:380px;margin:12vh auto 0;background:var(--card);border:1px solid var(--line);border-radius:18px;padding:30px 26px;text-align:center;box-shadow:0 12px 40px -22px rgba(28,23,25,.4)}
#gate h2{font-family:var(--serif);font-weight:600;font-size:24px;margin:0 0 4px}
#gate p{color:var(--muted);font-size:13px;margin:0 0 18px}
#gate input{width:100%;padding:13px 14px;border:1px solid var(--line);border-radius:11px;font-family:var(--sans);font-size:15px;text-align:center;letter-spacing:.04em}
#gate input:focus{outline:none;border-color:var(--crimson)}
#gate button{width:100%;margin-top:12px;border:0;border-radius:11px;padding:13px;font-family:var(--sans);font-size:15px;font-weight:600;color:#fff;background:var(--grad);cursor:pointer}
#gateMsg{color:var(--neg);font-size:13px;margin-top:10px;min-height:18px}
#app{display:none}

/* KPIs */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:18px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 14px}
.kpi .lab{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:600}
.kpi .val{font-family:var(--serif);font-weight:700;font-size:28px;line-height:1.1;margin-top:2px}
.kpi .sub{font-size:12px;color:var(--muted);margin-top:2px}
.kpi.warn .val{color:var(--warn)}

/* FICHAS FALTANTES */
.stitle{font-family:var(--serif);font-weight:600;font-size:20px;margin:0 0 12px;display:flex;align-items:center;gap:8px}
.stitle .cnt{background:var(--crimson);color:#fff;border-radius:999px;padding:2px 9px;font-family:var(--sans);font-size:12px;font-weight:700}
.faltante-card{background:var(--card);border:1px solid var(--line);border-left:3px solid var(--warn);border-radius:10px;padding:10px 13px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;gap:10px;cursor:pointer}
.faltante-card:hover{border-color:var(--crimson)}
.faltante-info .fp-name{font-weight:700;font-size:14px}
.faltante-info .fp-meta{font-size:12px;color:var(--muted);margin-top:1px}
.faltante-tag{font-size:11px;font-weight:700;color:var(--warn);white-space:nowrap}
.empty2{color:var(--muted);font-size:13px;text-align:center;padding:16px}

/* WEEK NAV + GRID (mismo lenguaje visual que Planificación de Pabellones) */
.week-nav{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.week-nav button{border:1px solid var(--line);background:var(--card);border-radius:8px;padding:7px 14px;font-family:var(--sans);font-size:13px;font-weight:600;cursor:pointer}
.week-nav button:hover{border-color:var(--crimson);color:var(--crimson)}
.week-nav .week-label{font-family:var(--serif);font-weight:600;font-size:18px}
.week-grid{display:grid;grid-template-columns:60px repeat(3,1fr);gap:0;border:1px solid var(--line);border-radius:12px;overflow:hidden;background:var(--card)}
.wg-corner{background:var(--tint);padding:8px;font-size:11px;font-weight:600;color:var(--muted);text-align:center;border-bottom:1px solid var(--line);border-right:1px solid var(--line)}
.wg-pab-hdr{padding:10px 8px;text-align:center;font-size:13px;font-weight:700;color:#fff;border-bottom:1px solid var(--line)}
.wg-pab-hdr.p1{background:var(--pab1)} .wg-pab-hdr.p2{background:var(--pab2)} .wg-pab-hdr.p3{background:var(--pab3)}
.wg-day{padding:8px 6px;font-size:12px;font-weight:600;color:var(--muted);text-align:center;border-bottom:1px solid var(--line);border-right:1px solid var(--line);background:var(--tint)}
.wg-day.today{background:#FBF3E2;color:var(--warn)}
.wg-cell{padding:4px;border-bottom:1px solid var(--line);border-right:1px solid var(--line);min-height:60px;vertical-align:top}
.wg-cell:nth-child(4n){border-right:none}
.wg-block{border-radius:6px;padding:5px 7px;margin-bottom:3px;font-size:11.5px;line-height:1.3;cursor:pointer}
.wg-block.firme{background:#E4F1F1;border-left:3px solid #0E7C86}
.wg-block.provisoria{background:#FBF3E2;border-left:3px solid var(--warn)}
.wg-block.en-cirugia{background:#FBEBED;border-left:3px solid var(--neg)}
.wg-block.finalizada{background:#E7F4ED;border-left:3px solid var(--pos);opacity:.7}
.wg-block .wb-name{font-weight:600;color:var(--ink)}
.wg-block .wb-info{color:var(--muted);font-size:10.5px}
@media(max-width:700px){.week-grid{grid-template-columns:50px repeat(3,1fr)} .wg-block{font-size:10.5px;padding:4px 5px}}

/* CHIPS DE FICHA */
.fx{display:inline-block;font-size:9.5px;font-weight:700;border-radius:5px;padding:2px 5px;margin:3px 3px 0 0;line-height:1.35}
.fx.ok{background:#E7F3EC;color:var(--pos)}
.fx.al{background:#FBE9EB;color:var(--neg)}
.fx.wa{background:#FBF3E2;color:var(--warn)}
.fx.in{background:#E8F0FA;color:var(--info)}
.fx.no{background:#F0EAEB;color:var(--muted)}
.fx.clic{cursor:pointer}

/* MODAL FICHA (solo lectura) */
#modal{position:fixed;inset:0;background:rgba(28,23,25,.55);display:none;z-index:90;padding:14px;overflow-y:auto}
#modal.on{display:block}
.mbox{max-width:620px;margin:20px auto;background:var(--card);border-radius:16px;padding:22px}
.mbox h3{font-family:var(--serif);font-size:25px;font-weight:600;line-height:1.2}
.mbox .sub{color:var(--muted);font-size:13px;margin-top:2px}
.mrow{display:grid;grid-template-columns:1fr 1fr;gap:10px 16px;margin-top:14px}
.mrow .l{color:var(--muted);font-size:11px}
.mrow .v{font-weight:600;font-size:13.5px;margin-top:1px}
.msec{margin-top:16px;padding-top:13px;border-top:1px solid var(--line)}
.msec .t{font-size:10.5px;font-weight:700;letter-spacing:1.1px;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
.alerta{background:#FBE9EB;border:1px solid #F0C6CC;border-radius:9px;padding:10px 12px;margin-bottom:8px;font-size:13px;color:var(--neg)}
.alerta.wa{background:#FBF3E2;border-color:#E9D9AE;color:var(--warn)}
.chipr{display:inline-block;border:1px solid var(--line);border-radius:999px;padding:4px 10px;margin:0 5px 5px 0;font-size:12px}
.lnk{border:1px solid var(--line);background:var(--card);border-radius:9px;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--sans)}
.lnk:hover{border-color:var(--crimson);color:var(--crimson)}
@media(max-width:560px){.mrow{grid-template-columns:1fr}}

.foot{margin-top:22px;text-align:center;color:var(--faint);font-size:12px}
</style>
</head>
<body>

<div id="gate">
  <h2>Operaciones</h2>
  <p>Jefe de Operaciones · Ingrese su clave de acceso</p>
  <input type="password" id="clave" placeholder="Clave" autocomplete="off">
  <button id="entrar">Ingresar</button>
  <div id="gateMsg"></div>
</div>

<div id="modal"><div class="mbox" id="mbox"></div></div>

<div id="app" class="wrap">
  <div class="hdr">
    <div>
      <h1>Operaciones</h1>
      <div class="sub" id="fechaHoy"></div>
    </div>
    <div class="hdr-right">
      <span class="who-txt" id="whoTxt"></span>
      <span class="who-txt" id="lastUpdate"></span>
      <button class="hdr-btn" onclick="cargarTodo()">↻ Actualizar</button>
    </div>
  </div>

  <div class="kpis" id="kpis"></div>

  <div class="stitle">Fichas faltantes <span class="cnt" id="faltantesCnt">0</span></div>
  <div id="faltantes"></div>

  <div style="margin-top:22px" id="semana"></div>

  <div class="foot">Panel de solo lectura · Operaciones lee la agenda quirúrgica y las fichas prequirúrgicas, no las modifica. Nada se improvisa.</div>
</div>

<script>
const SUPA_URL='https://rhpguniznuhljiigwetq.supabase.co';
const SUPA_KEY='sb_publishable_lVaI9a2wWFa0PSL3edPiRA_cVMlXDwG';
const DIAS_CORTO=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];

const $=id=>document.getElementById(id);
let CLAVE='',SESION='',SEMANA_CASOS=[],semanaOffset=1; // arranca en la PRÓXIMA semana, no hoy

async function rpc(fn,body){
  const r=await fetch(SUPA_URL+'/rest/v1/rpc/'+fn,{method:'POST',
    headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json'},
    body:JSON.stringify(body)});
  if(!r.ok){ throw new Error(await r.text()); }
  return r.json();
}

/* LOGIN */
$('entrar').onclick=entrar;
$('clave').addEventListener('keydown',e=>{if(e.key==='Enter')entrar();});
async function entrar(){
  const c=$('clave').value.trim(); if(!c)return;
  $('gateMsg').textContent='Verificando…';
  try{
    const u=await rpc('smi_login',{p_clave:c});
    const usr=Array.isArray(u)?u[0]:u;
    if(!usr || !usr.puede_operaciones){$('gateMsg').textContent='Esa clave no tiene acceso a Operaciones.';return;}
    SESION=usr.nombre; CLAVE=c;
    const hoy=new Date();
    const dias=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
    const meses=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
    $('fechaHoy').textContent=dias[hoy.getDay()]+' '+hoy.getDate()+' de '+meses[hoy.getMonth()]+', '+hoy.getFullYear();
    $('whoTxt').textContent=SESION;
    await cargarTodo();
    $('gate').style.display='none';$('app').style.display='block';
  }catch(e){$('gateMsg').textContent='Error de conexión.';}
}

async function cargarTodo(){
  await cargarSemana();
  renderAll();
  $('lastUpdate').textContent='Actualizado '+new Date().toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'});
}

async function cargarSemana(){
  const lunes=getLunes(semanaOffset);
  const domingo=new Date(lunes); domingo.setDate(domingo.getDate()+6);
  try{
    const data=await rpc('smi_casos_semana',{p_clave:CLAVE,p_desde:fmtDate(lunes),p_hasta:fmtDate(domingo)});
    SEMANA_CASOS=Array.isArray(data)?data:(data?[data]:[]);
  }catch(e){SEMANA_CASOS=[];console.error(e);}
}

function renderAll(){ renderKpis(); renderFaltantes(); renderSemana(); }

/* ═══ KPIs ═══ */
function renderKpis(){
  const total=SEMANA_CASOS.length;
  const conInstrumental=SEMANA_CASOS.filter(c=>c.ficha && c.ficha.instrumental).length;
  const faltantes=SEMANA_CASOS.filter(c=>!c.ficha || !c.ficha.completada).length;
  let h='';
  h+='<div class="kpi"><div class="lab">Cirugías</div><div class="val">'+total+'</div><div class="sub">semana en vista</div></div>';
  h+='<div class="kpi"><div class="lab">Instrumental propio</div><div class="val">'+conInstrumental+'</div><div class="sub">requieren 48 h antes</div></div>';
  h+='<div class="kpi'+(faltantes?' warn':'')+'"><div class="lab">Fichas faltantes</div><div class="val">'+faltantes+'</div><div class="sub">sin completar</div></div>';
  $('kpis').innerHTML=h;
}

/* ═══ FICHAS FALTANTES ═══ */
function renderFaltantes(){
  const falt=SEMANA_CASOS.filter(c=>!c.ficha || !c.ficha.completada)
    .sort((a,b)=>(a.fecha||'').localeCompare(b.fecha||''));
  $('faltantesCnt').textContent=falt.length;
  if(!falt.length){ $('faltantes').innerHTML='<div class="empty2">Todas las cirugías de la semana tienen ficha completa.</div>'; return; }
  let h='';
  falt.forEach(c=>{
    const cot=c.cotizacion||{};
    const fd=c.fecha?new Date(c.fecha+'T12:00:00').toLocaleDateString('es-CL',{weekday:'short',day:'numeric',month:'short'}):'—';
    h+='<div class="faltante-card" onclick="verFicha(\''+(cot.folio||'')+'\')">'
     + '<div class="faltante-info"><div class="fp-name">'+(cot.paciente||'—')+'</div>'
     + '<div class="fp-meta">'+(cot.folio||'')+' · '+(cot.cirugia||'')+' · '+(cot.cirujano||'')+' · Pab '+c.pabellon+'</div></div>'
     + '<div class="faltante-tag">'+fd+' ⚠</div>'
     + '</div>';
  });
  $('faltantes').innerHTML=h;
}

/* ═══ VISTA SEMANAL ═══ */
function getLunes(offset){
  const d=new Date(); d.setDate(d.getDate()-d.getDay()+1+(offset*7)); d.setHours(0,0,0,0); return d;
}
function fmtDate(d){ if(typeof d==='string') return d; if(!d||!d.getFullYear) return ''; return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function fmtDMes(d){return d.getDate()+'/'+(d.getMonth()+1);}

function renderSemana(){
  const lunes=getLunes(semanaOffset);
  const dom=new Date(lunes); dom.setDate(dom.getDate()+6);
  const hoyStr=fmtDate(new Date());

  let h='<div class="week-nav">';
  h+='<button onclick="semanaOffset--;cargarSemana().then(renderAll)">← Anterior</button>';
  h+='<span class="week-label">'+fmtDMes(lunes)+' — '+fmtDMes(dom)+'</span>';
  h+='<button onclick="semanaOffset++;cargarSemana().then(renderAll)">Siguiente →</button>';
  h+='<button onclick="semanaOffset=1;cargarSemana().then(renderAll)">Próxima semana</button>';
  h+='</div>';

  h+='<div class="week-grid">';
  h+='<div class="wg-corner"></div>';
  h+='<div class="wg-pab-hdr p1">Pab 1</div>';
  h+='<div class="wg-pab-hdr p2">Pab 2</div>';
  h+='<div class="wg-pab-hdr p3">Pab 3</div>';

  for(let i=0;i<6;i++){
    const dia=new Date(lunes); dia.setDate(dia.getDate()+i);
    const dStr=fmtDate(dia);
    const isToday=dStr===hoyStr;
    h+='<div class="wg-day'+(isToday?' today':'')+'">'+DIAS_CORTO[dia.getDay()]+'<br>'+dia.getDate()+'</div>';

    for(let p=1;p<=3;p++){
      const casos=SEMANA_CASOS.filter(c=>c.fecha===dStr && c.pabellon===p);
      h+='<div class="wg-cell">';
      casos.forEach(c=>{
        const cot=c.cotizacion||{};
        let cls='wg-block ';
        if(c.estado==='en_cirugia') cls+='en-cirugia';
        else if(c.estado==='finalizada') cls+='finalizada';
        else if(c.estado_cot==='pagada') cls+='firme';
        else cls+='provisoria';

        h+='<div class="'+cls+'" onclick="verFicha(\''+(cot.folio||'')+'\')">';
        h+='<div class="wb-info" style="font-weight:700;color:var(--crimson);font-size:10px">'+(cot.folio||'')+'</div>';
        h+='<div class="wb-name">'+(cot.paciente||'—')+'</div>';
        h+='<div class="wb-info">'+(cot.cirugia||'')+' · '+(cot.cirujano||'')+'</div>';
        h+='<div class="wb-info">'+(c.duracion_cotizada_min||0)+' min</div>';
        h+=fichaChips(c.ficha, cot.folio);
        h+='</div>';
      });
      h+='</div>';
    }
  }
  h+='</div>';
  $('semana').innerHTML=h;
}

/* ═══ CHIPS + MODAL DE FICHA (solo lectura) ═══ */
function fichaChips(f, folio){
  const F=folio||'';
  if(!f || !f.completada){
    return '<div><span class="fx wa clic" onclick="event.stopPropagation();verFicha(\''+F+'\')">⚠ Sin ficha</span></div>';
  }
  let h='<div>';
  h+='<span class="fx ok clic" onclick="event.stopPropagation();verFicha(\''+F+'\')">✓ Ficha</span>';
  if(f.alergias===true) h+='<span class="fx al clic" onclick="event.stopPropagation();verFicha(\''+F+'\')">⚠ ALERGIAS</span>';
  if(f.anest_smi===false && f.anest_acreditado===false)
    h+='<span class="fx al clic" onclick="event.stopPropagation();verFicha(\''+F+'\')">⚕ Anest. sin acreditar</span>';
  if(f.instrumental) h+='<span class="fx wa clic" onclick="event.stopPropagation();verFicha(\''+F+'\')">📦 Instrumental propio</span>';
  if(f.req_n>0) h+='<span class="fx in clic" onclick="event.stopPropagation();verFicha(\''+F+'\')">🔧 '+f.req_n+' req.</span>';
  if(f.hora_solicitada) h+='<span class="fx no">🕐 pide '+String(f.hora_solicitada).slice(0,5)+'</span>';
  h+='</div>';
  return h;
}

const SN=v=>v===true?'Sí':(v===false?'No':'—');
function verFicha(folio){
  if(!folio) return;
  $('mbox').innerHTML='<div style="color:var(--muted);text-align:center;padding:20px">Cargando…</div>';
  $('modal').classList.add('on');
  rpc('smi_ficha_pre_ver',{p_clave:CLAVE,p_folio:folio}).then(d=>{
    if(!d || !d.ficha){ $('mbox').innerHTML=fichaVacia(folio); return; }
    $('mbox').innerHTML=fichaHTML(d, folio);
  }).catch(()=>{ $('mbox').innerHTML=fichaVacia(folio); });
}
function cerrarFicha(){ $('modal').classList.remove('on'); }
$('modal').addEventListener('click',e=>{ if(e.target.id==='modal') cerrarFicha(); });

function fichaVacia(folio){
  return '<h3>Sin ficha prequirúrgica</h3>'
   + '<div class="sub">'+folio+' · la asistente aún no la completó.</div>'
   + '<div class="alerta wa" style="margin-top:14px">No hay datos del paciente: alergias, medicación ni requerimientos. '
   + 'Avise a seguimiento/enfermería para que la soliciten.</div>'
   + '<div style="margin-top:16px"><button class="lnk" onclick="cerrarFicha()">Cerrar</button></div>';
}

function fichaHTML(d, folio){
  const f=d.ficha, c=d.cotizacion||{};
  const nom=[f.nombres,f.apellido_paterno,f.apellido_materno].filter(Boolean).join(' ') || c.paciente || '—';
  let h='<h3>'+nom+'</h3><div class="sub">'+(c.cirugia||'')+' · '+(c.cirujano||'')+'</div>';

  let al='';
  if(f.tiene_alergias===true) al+='<div class="alerta"><strong>ALERGIAS:</strong> '+(f.alergias||'sin detalle')+'</div>';
  if(f.anestesista_smi===false && d.anest_acreditado===false)
    al+='<div class="alerta"><strong>Anestesista sin acreditar:</strong> '+(f.anestesista_externo||'—')
       +'. No figura en el registro del comité.</div>';
  if(f.instrumental_propio===true)
    al+='<div class="alerta wa"><strong>Instrumental propio del cirujano:</strong> '+(f.instrumental_detalle||'—')
       +'. Debe llegar 48 h antes para recepción y esterilización.</div>';
  if(f.usa_medicamentos===true) al+='<div class="alerta wa"><strong>Medicación habitual:</strong> '+(f.medicacion||'sin detalle')+'</div>';
  if(al) h+='<div style="margin-top:14px">'+al+'</div>';

  h+='<div class="mrow">'
   + kv('Modalidad', f.modalidad==='hospitalizacion'?'Con hospitalización':(f.modalidad==='ambulatoria'?'Ambulatoria':'—'))
   + kv('Hora solicitada', f.hora_solicitada?String(f.hora_solicitada).slice(0,5):'—')
   + kv('Anestesista', f.anestesista_smi===true?'De SMI':(f.anestesista_smi===false?(f.anestesista_externo||'Del cirujano'):'—'))
   + kv('Alergias', SN(f.tiene_alergias))
   + '</div>';

  const req=Array.isArray(f.req_items)?f.req_items:[];
  if(req.length || f.requerimientos){
    h+='<div class="msec"><div class="t">Requerimientos especiales</div>';
    req.forEach(r=>{ h+='<span class="chipr">'+r+'</span>'; });
    if(f.requerimientos) h+='<div style="font-size:13px;margin-top:7px;color:var(--muted)">Otro: '+f.requerimientos+'</div>';
    h+='</div>';
  }

  h+='<div class="msec"><div class="t">Ficha</div><div style="font-size:12.5px;color:var(--muted)">'
   + 'Completada por '+(f.completada_por||'—')
   + (f.completada_en?'<br>'+new Date(f.completada_en).toLocaleString('es-CL',{day:'numeric',month:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'}):'')
   + '</div></div>';

  h+='<div style="margin-top:16px"><button class="lnk" onclick="cerrarFicha()">Cerrar</button></div>';
  return h;
}
function kv(l,v){ return '<div><div class="l">'+l+'</div><div class="v">'+(v||'—')+'</div></div>'; }
</script>
</body>
</html>
