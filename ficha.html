<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ficha del Caso · SMI</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --crimson:#CD1D52; --bright:#E33C3B; --deep:#B22030;
  --ink:#1C1719; --muted:#857479; --faint:#A99CA0;
  --bg:#FAF7F6; --card:#FFFFFF; --line:#ECE0E2; --tint:#F7F0F1;
  --pos:#1E7A4D; --neg:#C0202F; --warn:#B7791F; --info:#3B6FB3;
  --serif:'Cormorant Garamond',Georgia,serif; --sans:'Inter',-apple-system,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:14px;-webkit-text-size-adjust:100%}
.wrap{max-width:980px;margin:0 auto;padding:22px 18px 60px}
.mast{text-align:center;margin-bottom:18px}
.mast h1{font-family:var(--serif);font-size:34px;font-weight:600;letter-spacing:.4px}
.mast .sub{color:var(--muted);font-size:13px;margin-top:2px}

/* Gate */
#gate{max-width:380px;margin:12vh auto;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:28px}
#gate h2{font-family:var(--serif);font-size:26px;font-weight:600;text-align:center;margin-bottom:4px}
#gate p.g{color:var(--muted);font-size:12.5px;text-align:center;margin-bottom:16px}
input,select{width:100%;border:1px solid var(--line);border-radius:9px;padding:11px 12px;font-family:var(--sans);font-size:14px;background:#fff;color:var(--ink)}
input:focus,select:focus{outline:2px solid var(--crimson);outline-offset:-1px}
.btn{width:100%;border:0;border-radius:9px;padding:12px;font-family:var(--sans);font-size:14px;font-weight:700;background:var(--deep);color:#fff;cursor:pointer;margin-top:10px}
#gateMsg{color:var(--neg);font-size:12.5px;text-align:center;margin-top:9px;min-height:16px}

.sesbar{display:flex;justify-content:flex-end;align-items:center;gap:10px;font-size:12.5px;color:var(--muted);margin-bottom:8px}
.lnk{border:1px solid var(--line);background:#fff;border-radius:8px;padding:5px 11px;font-size:12px;font-weight:600;color:var(--ink);cursor:pointer}

/* Buscador */
.searchbox{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:16px}
.searchrow{display:flex;gap:8px}
.searchrow input{flex:1}
.searchrow button{border:0;border-radius:9px;padding:0 20px;font-family:var(--sans);font-size:14px;font-weight:700;background:var(--deep);color:#fff;cursor:pointer;white-space:nowrap}
.hint{color:var(--faint);font-size:12px;margin-top:7px}

.results{margin-top:12px;border-top:1px solid var(--line)}
.res-item{padding:11px 4px;border-bottom:1px solid var(--line);cursor:pointer;display:flex;justify-content:space-between;gap:12px;align-items:center}
.res-item:hover{background:var(--tint)}
.res-folio{color:var(--crimson);font-weight:700;font-size:12px}
.res-name{font-weight:600;font-size:13.5px}
.res-meta{color:var(--muted);font-size:12px}

/* Ficha */
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:14px}
.eyebrow{font-size:10.5px;font-weight:700;letter-spacing:1.3px;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
.fh{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;flex-wrap:wrap}
.fh h2{font-family:var(--serif);font-size:27px;font-weight:600;line-height:1.15}
.fh .who{color:var(--muted);font-size:13px;margin-top:3px}
.folio-big{color:var(--crimson);font-weight:700;font-size:13px;text-align:right}
.pill{display:inline-block;border-radius:999px;padding:3px 11px;font-size:10.5px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;margin-top:5px}
.pill.ok{background:#E7F3EC;color:var(--pos)} .pill.warn{background:#FBF3E2;color:var(--warn)}
.pill.neg{background:#FBE9EB;color:var(--neg)} .pill.info{background:#E8F0FA;color:var(--info)}
.pill.grey{background:#F0EAEB;color:var(--muted)}

.kv{display:grid;grid-template-columns:1fr 1fr;gap:11px 18px}
.kv .lbl{color:var(--muted);font-size:11.5px}
.kv .val{font-weight:600;font-size:13.5px;margin-top:1px}
@media(max-width:640px){.kv{grid-template-columns:1fr}}

/* Timeline */
.tl{position:relative;padding-left:26px}
.tl:before{content:'';position:absolute;left:7px;top:5px;bottom:5px;width:2px;background:var(--line)}
.tl-item{position:relative;padding:0 0 16px}
.tl-item:last-child{padding-bottom:0}
.tl-dot{position:absolute;left:-24px;top:3px;width:12px;height:12px;border-radius:50%;background:var(--card);border:2px solid var(--faint)}
.tl-dot.done{border-color:var(--pos);background:var(--pos)}
.tl-dot.warn{border-color:var(--warn);background:var(--warn)}
.tl-dot.neg{border-color:var(--neg);background:var(--neg)}
.tl-dot.pend{border-color:var(--line);background:var(--card)}
.tl-t{font-weight:600;font-size:13.5px}
.tl-m{color:var(--muted);font-size:12px;margin-top:1px}
.tl-item.futuro .tl-t{color:var(--faint);font-weight:500}

/* Tablas */
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;font-size:10.5px;letter-spacing:.7px;text-transform:uppercase;color:var(--muted);font-weight:700;padding:0 8px 8px;border-bottom:1px solid var(--line)}
td{padding:9px 8px;border-bottom:1px solid var(--line);vertical-align:top}
td.num,th.num{text-align:right;white-space:nowrap}
tr:last-child td{border-bottom:0}
.eq-tag{display:inline-block;border:1px solid var(--line);border-radius:999px;padding:5px 12px;margin:0 6px 6px 0;font-size:12.5px}
.eq-rol{color:var(--crimson);font-weight:700;font-size:10px;letter-spacing:.7px;text-transform:uppercase;margin-right:5px}

.tot{display:flex;justify-content:space-between;padding:8px 0;font-size:13.5px}
.tot.big{border-top:2px solid var(--ink);margin-top:6px;padding-top:11px;font-size:17px;font-weight:700;font-family:var(--serif)}
.tot .neg{color:var(--neg);font-weight:700}
.empty{color:var(--faint);font-size:13px;padding:8px 0}
.foot{text-align:center;color:var(--faint);font-size:11.5px;margin-top:26px}

@media print{
  body{background:#fff}
  .sesbar,.searchbox,.noprint{display:none!important}
  .card{border:1px solid #ddd;break-inside:avoid}
  .wrap{padding:0}
}
</style>
</head>
<body>

<div id="gate">
  <h2>Ficha del Caso</h2>
  <p class="g">Santiago Medical Institute</p>
  <input id="clave" type="password" placeholder="Clave de acceso" autocomplete="current-password">
  <button class="btn" id="entrar">Entrar</button>
  <div id="gateMsg"></div>
</div>

<div class="wrap" id="app" style="display:none">
  <div class="sesbar">
    <span>Sesión de <strong id="whoTxt" style="color:var(--crimson)">—</strong></span>
    <button class="lnk" id="salir">Salir</button>
  </div>

  <header class="mast">
    <h1>Ficha del Caso</h1>
    <div class="sub">Historial completo por folio · Santiago Medical Institute</div>
  </header>

  <div class="searchbox noprint">
    <div class="searchrow">
      <input id="q" placeholder="Folio (SMI-00116), RUT o nombre del paciente" autocomplete="off">
      <button id="buscar">Buscar</button>
    </div>
    <div class="hint">Escriba el folio completo para ir directo, o parte del nombre/RUT para ver coincidencias.</div>
    <div id="results"></div>
  </div>

  <div id="ficha"></div>

  <div class="foot">Santiago Medical Institute · Ficha del Caso</div>
</div>

<script>
const SUPA_URL='https://rhpguniznuhljiigwetq.supabase.co';
const SUPA_KEY='sb_publishable_lVaI9a2wWFa0PSL3edPiRA_cVMlXDwG';
const $=id=>document.getElementById(id);
const DIAS=['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
const MESES=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
let CLAVE='',SESION='';

async function rpc(fn,body){
  const r=await fetch(SUPA_URL+'/rest/v1/rpc/'+fn,{method:'POST',
    headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json'},
    body:JSON.stringify(body)});
  if(!r.ok){throw new Error(await r.text());}
  return r.json();
}
const clp=n=>'$'+Math.round(n||0).toLocaleString('es-CL');
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

function fDT(ts){
  if(!ts) return '';
  const d=new Date(ts);
  if(isNaN(d)) return '';
  return d.getDate()+'/'+(d.getMonth()+1)+'/'+d.getFullYear()+' · '+
         String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}
function fD(s){
  if(!s) return '';
  const p=String(s).slice(0,10).split('-');
  if(p.length!==3) return s;
  const d=new Date(+p[0],+p[1]-1,+p[2]);
  return DIAS[d.getDay()]+' '+d.getDate()+' de '+MESES[d.getMonth()]+' de '+d.getFullYear();
}
function dur(m){
  if(m==null) return '—';
  const h=Math.floor(m/60), r=m%60;
  return (h?h+' h ':'')+r+' min';
}

/* ══ LOGIN ══ */
$('entrar').onclick=entrar;
$('clave').addEventListener('keydown',e=>{if(e.key==='Enter')entrar();});
async function entrar(){
  const c=$('clave').value.trim(); if(!c) return;
  $('gateMsg').textContent='Verificando…';
  try{
    const u=await rpc('smi_login',{p_clave:c});
    const usr=Array.isArray(u)?u[0]:u;
    if(!usr){$('gateMsg').textContent='Clave incorrecta.';return;}
    if(!usr.puede_ficha){$('gateMsg').textContent='Esta clave no tiene acceso a las fichas.';return;}
    SESION=usr.nombre; CLAVE=c;
    $('whoTxt').textContent=SESION;
    $('gate').style.display='none'; $('app').style.display='block';
    const pre=new URLSearchParams(location.search).get('folio');
    if(pre){ $('q').value=pre; abrirFolio(pre); }
    else $('q').focus();
  }catch(e){ $('gateMsg').textContent='Error de conexión.'; }
}
$('salir').onclick=()=>location.reload();

/* ══ BUSCAR ══ */
$('buscar').onclick=buscar;
$('q').addEventListener('keydown',e=>{if(e.key==='Enter')buscar();});
async function buscar(){
  const q=$('q').value.trim();
  if(!q){ $('results').innerHTML=''; return; }
  if(/^SMI-?\d+$/i.test(q)){ return abrirFolio(q); }
  $('results').innerHTML='<div class="empty">Buscando…</div>';
  try{
    const data=await rpc('smi_buscar_casos',{p_clave:CLAVE,p_q:q});
    const arr=Array.isArray(data)?data:[];
    if(!arr.length){ $('results').innerHTML='<div class="empty">Sin coincidencias.</div>'; return; }
    let h='<div class="results">';
    arr.forEach(r=>{
      h+='<div class="res-item" data-f="'+esc(r.folio)+'">'
       +   '<div><div class="res-folio">'+esc(r.folio)+'</div>'
       +   '<div class="res-name">'+esc(r.paciente)+'</div>'
       +   '<div class="res-meta">'+esc(r.cirugia||'')+(r.rut?' · '+esc(r.rut):'')+'</div></div>'
       +   '<div class="res-meta" style="text-align:right;white-space:nowrap">'+(r.fecha_cirugia?fD(r.fecha_cirugia).split(' de ')[0]:'')+'<br>'+esc(r.estado||'')+'</div>'
       + '</div>';
    });
    h+='</div>';
    $('results').innerHTML=h;
    document.querySelectorAll('.res-item').forEach(el=>{
      el.onclick=()=>{ $('q').value=el.dataset.f; abrirFolio(el.dataset.f); };
    });
  }catch(e){ $('results').innerHTML='<div class="empty">Error al buscar.</div>'; }
}

async function abrirFolio(folio){
  $('results').innerHTML='';
  $('ficha').innerHTML='<div class="card"><div class="empty">Cargando ficha…</div></div>';
  try{
    const d=await rpc('smi_ficha_caso',{p_clave:CLAVE,p_folio:folio});
    if(!d || !d.cotizacion){ $('ficha').innerHTML='<div class="card"><div class="empty">No existe el folio '+esc(folio)+'.</div></div>'; return; }
    render(d);
    history.replaceState(null,'','?folio='+encodeURIComponent(d.cotizacion.folio));
  }catch(e){ $('ficha').innerHTML='<div class="card"><div class="empty">Error al cargar la ficha.</div></div>'; }
}

/* ══ RENDER ══ */
function pillEstado(e){
  const m={pagada:'ok',operada:'ok',agendada:'info',entregada:'grey',perdida:'neg',finalizada:'ok',en_cirugia:'warn',programada:'info'};
  return '<span class="pill '+(m[e]||'grey')+'">'+esc(e||'—')+'</span>';
}

function render(d){
  const cot=d.cotizacion;
  const casos=d.casos||[];
  const c=casos.length?casos[0].caso:null;
  const equipo=casos.length?(casos[0].equipo||[]):[];
  const extras=casos.length?(casos[0].extras||[]):[];

  let h='';

  /* Encabezado */
  h+='<div class="card"><div class="fh">'
   + '<div><h2>'+esc(cot.paciente||'—')+'</h2>'
   + '<div class="who">'+esc(cot.cirugia||'')+' · '+esc(cot.cirujano||'')+(cot.rut?' · '+esc(cot.rut):'')+'</div></div>'
   + '<div><div class="folio-big">'+esc(cot.folio)+'</div><div style="text-align:right">'+pillEstado(cot.estado)+'</div></div>'
   + '</div>';
  h+='<div class="kv" style="margin-top:16px">'
   + kv('Pabellón', c&&c.pabellon?('Pabellón '+c.pabellon):'—')
   + kv('Fecha de cirugía', c&&c.fecha?fD(c.fecha):(cot.fecha_cirugia?fD(cot.fecha_cirugia):'—'))
   + kv('Tiempo cotizado', c&&c.duracion_cotizada_min!=null?dur(c.duracion_cotizada_min):(cot.horas?cot.horas+' h':'—'))
   + kv('Tiempo real', c&&c.duracion_real_min!=null?dur(c.duracion_real_min):'—')
   + kv('Hospitalización', cot.hospitalizacion?'Sí':'No')
   + kv('Cotizado por', cot.cotizador||'—')
   + '</div></div>';

  /* Línea de tiempo */
  const bit=(d.eventos||[]);
  h+='<div class="card"><div class="eyebrow">Línea de tiempo</div>';
  if(bit.length){
    h+='<div class="tl">';
    bit.forEach(e=>{
      const et=EV_LABEL[e.evento]||e.evento.replace(/_/g,' ');
      const k=EV_KIND[e.evento]||'done';
      const m=[fDT(e.ocurrido_at), e.actor?'por '+e.actor:'', detalleTxt(e.detalle)].filter(x=>x&&String(x).trim()).join(' · ');
      h+='<div class="tl-item"><div class="tl-dot '+k+'"></div>'
       + '<div class="tl-t">'+esc(et)+'</div>'
       + (m?'<div class="tl-m">'+esc(m)+'</div>':'')+'</div>';
    });
    h+='</div>';
    h+='<div class="tl-m" style="margin-top:12px;padding-top:10px;border-top:1px solid var(--line)">Registro de bitácora · '+bit.length+' evento'+(bit.length!==1?'s':'')+'</div>';
    h+='</div>';
  } else {
  h+='<div class="tl">';
  const ev=[];
  ev.push({t:'Cotización creada',m:[fDT(cot.creada_en),cot.cotizador?'por '+cot.cotizador:''],k:'done'});
  if(cot.descuento&&+cot.descuento>0){
    ev.push({t:'Descuento aplicado ('+Math.round(+cot.descuento*100)+'%)',
             m:[cot.glosa_desc||'',cot.autorizado_por?'autorizado por '+cot.autorizado_por:'',fDT(cot.resuelta_en)],
             k:cot.auth_estado==='rechazada'?'neg':'warn'});
  }
  if(cot.auth_estado&&cot.auth_estado!=='no_requiere'){
    ev.push({t:'Autorización: '+cot.auth_estado,
             m:[cot.autorizado_por?'por '+cot.autorizado_por:'',fDT(cot.resuelta_en),cot.motivo_rechazo||''],
             k:cot.auth_estado==='rechazada'?'neg':'done'});
  }
  if(cot.estado==='perdida') ev.push({t:'Cotización perdida',m:[cot.motivo_perdida||'',cot.marcado_por?'por '+cot.marcado_por:'',fDT(cot.actualizado_en)],k:'neg'});
  if(c){
    ev.push({t:'Asignada a Pabellón '+c.pabellon,m:[fD(c.fecha),c.registrado_por?'por '+c.registrado_por:'',fDT(c.created_at)],k:'done'});
    if(c.paciente_verificado) ev.push({t:'Identidad verificada',m:[c.verificado_por?'por '+c.verificado_por:'',fDT(c.verificado_at)],k:'done'});
    else ev.push({t:'Identidad verificada',m:['pendiente'],k:'pend',fut:true});
    if(equipo.length) ev.push({t:'Equipo quirúrgico definido',m:[equipo.length+' persona'+(equipo.length!==1?'s':'')],k:'done'});
    if(c.hora_inicio_real) ev.push({t:'Inicio de cirugía',m:[fDT(c.hora_inicio_real)],k:'done'});
    (extras||[]).forEach(x=>{
      ev.push({t:'Extra registrado · '+(x.descripcion||''),
               m:[fDT(x.registrado_at),x.registrado_por?'por '+x.registrado_por:'',clp(x.precio_total)],k:'warn'});
    });
    if(c.hora_fin_real){
      const dl=c.delta_min;
      ev.push({t:'Fin de cirugía',
               m:[fDT(c.hora_fin_real),
                  (c.duracion_real_min!=null?'duración real '+dur(c.duracion_real_min):''),
                  (dl!=null&&dl!==0?(dl>0?'excedió '+dl+' min':(Math.abs(dl))+' min menos'):'')],
               k:(c.delta_min>0?'neg':'done')});
    }
    if(c.estado==='en_recuperacion') ev.push({t:'En recuperación',m:[],k:'warn'});
    if(c.estado==='finalizada') ev.push({t:'Caso finalizado',m:['hora de cierre no registrada'],k:'done'});
    (extras||[]).forEach(x=>{
      if(x.estado==='validado') ev.push({t:'Extra validado · '+(x.descripcion||''),m:[fDT(x.validado_at),x.validado_por?'por '+x.validado_por:''],k:'done'});
      if(x.estado==='rechazado') ev.push({t:'Extra rechazado · '+(x.descripcion||''),m:[fDT(x.validado_at),x.validado_por?'por '+x.validado_por:'',x.motivo_rechazo?'motivo: '+x.motivo_rechazo:''],k:'neg'});
    });
    const pend=(extras||[]).filter(x=>x.estado==='pendiente').length;
    if(pend) ev.push({t:pend+' extra'+(pend!==1?'s':'')+' esperando validación',m:['pendiente de Enfermera Jefe'],k:'pend',fut:true});
  }
  if(cot.estado==='operada') ev.push({t:'Marcada como operada',m:[fDT(cot.fecha_operacion),cot.marcado_por?'por '+cot.marcado_por:''],k:'done'});

  ev.forEach(e=>{
    const m=(e.m||[]).filter(x=>x&&String(x).trim()).join(' · ');
    h+='<div class="tl-item'+(e.fut?' futuro':'')+'"><div class="tl-dot '+e.k+'"></div>'
     + '<div class="tl-t">'+esc(e.t)+'</div>'
     + (m?'<div class="tl-m">'+esc(m)+'</div>':'')+'</div>';
  });
  h+='</div>';
  h+='<div class="tl-m" style="margin-top:12px;padding-top:10px;border-top:1px solid var(--line);color:var(--faint)">Reconstruida desde los registros del caso · anterior a la bitácora</div>';
  h+='</div>';
  }

  /* Equipo */
  h+='<div class="card"><div class="eyebrow">Equipo quirúrgico</div>';
  if(equipo.length){
    equipo.forEach(e=>{ h+='<span class="eq-tag"><span class="eq-rol">'+esc(rolLabel(e.rol))+'</span>'+esc(e.nombre)+'</span>'; });
  } else h+='<div class="empty">Sin equipo registrado.</div>';
  h+='</div>';

  /* Extras */
  h+='<div class="card"><div class="eyebrow">Extras de pabellón</div>';
  if(extras.length){
    h+='<table><thead><tr><th>Detalle</th><th class="num">Cant.</th><th class="num">Unitario</th><th class="num">Total</th><th>Registró</th><th>Validó</th><th>Estado</th></tr></thead><tbody>';
    extras.forEach(x=>{
      const pm={validado:'ok',pendiente:'warn',rechazado:'neg'};
      h+='<tr><td>'+esc(x.descripcion||'')+(x.motivo_rechazo?'<div class="tl-m">Motivo: '+esc(x.motivo_rechazo)+'</div>':'')+'</td>'
       + '<td class="num">'+(x.cantidad||0)+'</td>'
       + '<td class="num">'+clp(x.precio_unitario)+'</td>'
       + '<td class="num"><strong>'+clp(x.precio_total)+'</strong></td>'
       + '<td>'+esc(x.registrado_por||'—')+'<div class="tl-m">'+fDT(x.registrado_at)+'</div></td>'
       + '<td>'+esc(x.validado_por||'—')+(x.validado_at?'<div class="tl-m">'+fDT(x.validado_at)+'</div>':'')+'</td>'
       + '<td><span class="pill '+(pm[x.estado]||'grey')+'">'+esc(x.estado)+'</span></td></tr>';
    });
    h+='</tbody></table>';
  } else h+='<div class="empty">Sin extras registrados.</div>';
  h+='</div>';

  /* Resumen económico */
  const exV=extras.filter(x=>x.estado==='validado');
  const tTiempo=exV.filter(x=>x.tipo==='tiempo_adicional').reduce((a,x)=>a+(x.precio_total||0),0);
  const tIns=exV.filter(x=>x.tipo!=='tiempo_adicional').reduce((a,x)=>a+(x.precio_total||0),0);
  const tPend=extras.filter(x=>x.estado==='pendiente').reduce((a,x)=>a+(x.precio_total||0),0);
  const base=+(cot.total||0);
  h+='<div class="card"><div class="eyebrow">Resumen económico</div>'
   + '<div class="tot"><span>Cotizado</span><span>'+clp(base)+'</span></div>'
   + (tTiempo?'<div class="tot"><span>Tiempo adicional</span><span class="neg">+'+clp(tTiempo)+'</span></div>':'')
   + (tIns?'<div class="tot"><span>Insumos y exámenes extra</span><span class="neg">+'+clp(tIns)+'</span></div>':'')
   + '<div class="tot big"><span>Total real</span><span>'+clp(base+tTiempo+tIns)+'</span></div>'
   + (tPend?'<div class="tl-m" style="margin-top:9px;color:var(--warn)">⏳ '+clp(tPend)+' en extras pendientes de validación (no incluidos).</div>':'')
   + '</div>';

  h+='<div class="noprint" style="text-align:center;margin-top:6px"><button class="lnk" onclick="window.print()">🖨 Imprimir / Guardar PDF</button></div>';

  $('ficha').innerHTML=h;
  window.scrollTo({top:0,behavior:'smooth'});
}

function detalleTxt(dt){
  if(!dt) return '';
  const p=[];
  if(dt.descripcion) p.push(dt.descripcion);
  if(dt.nombre) p.push(dt.nombre+(dt.rol?' ('+rolLabel(dt.rol)+')':''));
  if(dt.pabellon) p.push('Pab '+dt.pabellon);
  if(dt.precio_total!=null) p.push(clp(dt.precio_total));
  if(dt.duracion_real_min!=null) p.push('duración '+dur(dt.duracion_real_min));
  if(dt.delta_min!=null&&dt.delta_min!==0) p.push(dt.delta_min>0?'excedió '+dt.delta_min+' min':Math.abs(dt.delta_min)+' min menos');
  if(dt.de!=null&&dt.a!=null&&!dt.descripcion) p.push(dt.de+' → '+dt.a);
  if(dt.motivo) p.push('motivo: '+dt.motivo);
  if(dt.glosa) p.push(dt.glosa);
  return p.join(' · ');
}
function kv(l,v){ return '<div><div class="lbl">'+esc(l)+'</div><div class="val">'+esc(v)+'</div></div>'; }

const ROLES_LABEL={cirujano:'Cirujano',anestesista:'Anestesista',enfermero:'Enfermero/a',arsenalera:'Arsenalera',pabellonera:'Pabellonera',otro:'Otro',instrumentista:'Arsenalera'};
function rolLabel(r){ return ROLES_LABEL[r]||r||'—'; }
